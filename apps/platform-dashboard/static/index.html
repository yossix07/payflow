<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Platform | Core</title>
    <style>
      :root {
        --bg-color: #050510;
        --card-bg: rgba(20, 20, 40, 0.7);
        --accent-primary: #00f2ff;
        --accent-secondary: #7000ff;
        --text-primary: #ffffff;
        --text-secondary: #a0a0c0;
        --font-main: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: var(--text-primary);
        font-family: var(--font-main);
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image:
          radial-gradient(
            circle at 10% 20%,
            rgba(112, 0, 255, 0.1) 0%,
            transparent 20%
          ),
          radial-gradient(
            circle at 90% 80%,
            rgba(0, 242, 255, 0.1) 0%,
            transparent 20%
          );
      }

      .container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1;
      }

      /* Glassmorphism Card */
      .dashboard-card {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 40px;
        width: 80%;
        max-width: 800px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .dashboard-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: -50%;
        width: 200%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent-primary),
          transparent
        );
        animation: scan 4s linear infinite;
      }

      @keyframes scan {
        0% {
          transform: translateX(-50%);
        }
        100% {
          transform: translateX(50%);
        }
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(
          90deg,
          var(--text-primary),
          var(--accent-primary)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      p.subtitle {
        color: var(--text-secondary);
        font-size: 1.2rem;
        margin-bottom: 2rem;
      }

      /* Architecture Visualizer Placeholder */
      .arch-visualizer {
        width: 100%;
        height: 300px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        margin-top: 2rem;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .node {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(0, 242, 255, 0.1);
        border: 2px solid var(--accent-primary);
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--accent-primary);
        font-weight: bold;
        font-size: 0.8rem;
        position: absolute;
        animation: pulse 3s infinite ease-in-out;
      }

      .node.core {
        width: 100px;
        height: 100px;
        z-index: 10;
      }

      .connector {
        position: absolute;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        width: 100px;
        transform-origin: left center;
      }

      .status-badge {
        display: inline-block;
        padding: 8px 16px;
        background: rgba(0, 255, 128, 0.1);
        color: #00ff80;
        border: 1px solid rgba(0, 255, 128, 0.3);
        border-radius: 50px;
        font-size: 0.9rem;
        margin-top: 1rem;
        font-weight: 500;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4);
        }
        70% {
          box-shadow: 0 0 0 20px rgba(0, 242, 255, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 242, 255, 0);
        }
      }

      .footer {
        margin-top: 3rem;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="dashboard-card">
        <h1>Platform Dashboard</h1>
        <p class="subtitle">Infrastructure Visualization & Control</p>

        <div class="arch-visualizer" id="arch-canvas">
          <!-- Central Node -->
          <div class="node core">CORE</div>

          <!-- This is where we will dynamically render other nodes later -->
        </div>

        <div id="status-container">
          <span class="status-badge" id="system-status"
            >System Operational</span
          >
        </div>

        <div class="footer">
          <p>
            Host: <span id="hostname">Loading...</span> | Architecture:
            Event-Driven (Planned)
          </p>
        </div>
      </div>
    </div>

    <script>
      // Fetch simple system status
      fetch("/api/status")
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("hostname").textContent = data.hostname;
          document.getElementById("system-status").innerText =
            data.service + ": " + data.status;
        })
        .catch((err) => {
          console.error("Failed to fetch status", err);
          document.getElementById("hostname").textContent = "Unknown";
        });
    </script>
  </body>
</html>
