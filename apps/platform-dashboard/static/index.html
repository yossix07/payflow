<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayFlow — Live Event Flow</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>PayFlow</h1>
    <span id="connection-status" class="status-disconnected">Disconnected</span>
  </header>

  <main>
    <section id="topology">
      <svg id="topology-svg" width="100%" height="350"></svg>
    </section>

    <div id="panels">
      <section id="event-log">
        <h2>Event Log</h2>
        <div id="events-container"></div>
      </section>

      <section id="saga-status">
        <h2>Active Sagas</h2>
        <div id="sagas-container"></div>
      </section>
    </div>

    <section id="controls">
      <button id="btn-trigger-payment" onclick="triggerPayment()">&#9654; Trigger Payment</button>
      <button id="btn-trigger-failure" onclick="triggerFailure()">&#9654; Trigger Failure Demo</button>
    </section>
  </main>

  <script src="topology.js"></script>
  <script src="events.js"></script>
  <script src="app.js"></script>
</body>
</html>
